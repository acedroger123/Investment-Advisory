<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Settings</title>
<link rel="stylesheet" href="settings.css">
</head>
<body>

<div class="layout">

<nav class="sidebar">
<h2>Settings</h2>
<a href="dashboard.html">Dashboard</a>
<a href="expenses.html">Expense Tracker</a>
<a href="goals.html">Goals</a>
<a href="recommendations.html">Recommendations</a>
<a href="portfolio.html">Portfolio</a>
<a href="review.html">Monthly Review</a>
<a href="settings.html" class="active">Settings</a>
</nav>

<section class="main">

<div class="card">
<h3>Personal Details</h3>

<div id="profileAlert" class="alert"></div>

<form id="profileForm">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Country</label>
<input type="text" id="country" placeholder="Enter country">

<label>Occupation</label>
<input type="text" id="occupation" placeholder="Enter occupation">

<label>Annual Income Range</label>
<select id="annual_income_range">
<option value="1">Below ₹2,00,000</option>
<option value="2">₹2,00,000 – ₹5,00,000</option>
<option value="3">₹5,00,000 – ₹10,00,000</option>
<option value="4">Above ₹10,00,000</option>
</select>


<button type="submit">Update Profile</button>

</form>

<button class="logout" onclick="logout()">Logout</button>

</div>

</section>

</div>

<script src="settings.js"></script>
</body>
</html>
