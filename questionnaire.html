<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Investment Questionnaire</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="questionnaire-page">

  <div class="questionnaire-wrapper">
    <div class="wizard">

      <div class="progress">
        <span class="active"></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <form id="questionnaireForm">

        <!-- STEP 1 -->
        <section class="step active">
          <h3>About You</h3>

          <label>How old are you?</label>
          <select id="age_group">
            <option value="1">18–25</option>
            <option value="2">26–35</option>
            <option value="3">36–45</option>
            <option value="4">46–55</option>
            <option value="5">Above 55</option>
          </select>

          <label>What best describes your current situation?</label>
          <select id="occupation">
            <option>Student</option>
            <option>Working professional</option>
            <option>Self-employed / Business owner</option>
            <option>Retired</option>
            <option>Other</option>
          </select>

          <label>Your approximate monthly income</label>
          <select id="income_range">
            <option value="1">Below ₹20,000</option>
            <option value="2">₹20,000 – ₹50,000</option>
            <option value="3">₹50,000 – ₹1,00,000</option>
            <option value="4">Above ₹1,00,000</option>
          </select>

          <label>How much of your income do you usually save?</label>
          <select id="savings_percent">
            <option value="1">Less than 10%</option>
            <option value="2">10 – 20%</option>
            <option value="3">21 – 30%</option>
            <option value="4">More than 30%</option>
          </select>

          <button type="button" onclick="nextStep()">Next</button>
        </section>

        <!-- STEP 2 -->
        <section class="step">
          <h3>Your Experience With Money</h3>

          <label>Have you invested money before?</label>
          <select id="investment_experience">
            <option value="1">No, never</option>
            <option value="2">Yes, recently</option>
            <option value="3">Yes, for a few years</option>
            <option value="4">Yes, for many years</option>
          </select>

          <label>
            How many different types of investments have you tried?
            <small>(Example: FD, mutual funds, stocks, gold)</small>
          </label>
          <input type="number" id="instruments_used_count" min="0" placeholder="Enter a number">

          <label>
            How comfortable are you with basic money terms like returns and risk?
          </label>
          <input type="range" id="financial_comfort" min="1" max="5">

          <div class="nav">
            <button type="button" onclick="prevStep()">Back</button>
            <button type="button" onclick="nextStep()">Next</button>
          </div>
        </section>

        <!-- STEP 3 -->
        <section class="step">
          <h3>How You Feel About Risk</h3>

          <label>
            If your investment value drops by 10%, what would you most likely do?
          </label>
          <select id="loss_reaction">
            <option value="1">Withdraw my money immediately</option>
            <option value="2">Wait and see if it recovers</option>
            <option value="3">Invest more at a lower price</option>
            <option value="4">Not sure</option>
          </select>

          <label>Which statement sounds most like you?</label>
          <select id="return_priority">
            <option value="1">I prefer safety even if returns are low</option>
            <option value="2">I want a balance between safety and growth</option>
            <option value="3">I’m okay with risk for higher returns</option>
          </select>

          <label>How do you feel about ups and downs in the market?</label>
          <select id="volatility_comfort">
            <option value="1">Very uncomfortable</option>
            <option value="2">Slightly uncomfortable</option>
            <option value="3">Neutral</option>
            <option value="4">Comfortable</option>
          </select>

          <div class="nav">
            <button type="button" onclick="prevStep()">Back</button>
            <button type="button" onclick="nextStep()">Next</button>
          </div>
        </section>

        <!-- STEP 4 -->
        <section class="step">
          <h3>Your Goals</h3>

          <label>What is your main financial goal?</label>
          <select id="goal">
            <option>Emergency savings</option>
            <option>Education</option>
            <option>Buying a house</option>
            <option>Retirement</option>
            <option>Growing wealth</option>
          </select>

          <label>When do you want to achieve this goal?</label>
          <select id="time_horizon">
            <option value="1">Less than 3 years</option>
            <option value="2">3 – 5 years</option>
            <option value="3">6 – 10 years</option>
            <option value="4">More than 10 years</option>
          </select>

          <div class="nav">
            <button type="button" onclick="prevStep()">Back</button>
            <button type="button" onclick="nextStep()">Next</button>
          </div>
        </section>

        <!-- STEP 5 -->
        <section class="step">
          <h3>Final Check</h3>

          <label>Which best describes you as an investor?</label>
          <select id="risk_label">
            <option value="1">Careful and safety-focused</option>
            <option value="2">Balanced</option>
            <option value="3">Comfortable taking risks for growth</option>
          </select>

          <p style="margin-top:20px; font-size:13px;">
            Your answers help us understand your comfort level and suggest suitable investment options.
          </p>

          <button type="submit">Submit & View My Profile</button>
        </section>

      </form>
    </div>
  </div>

  <script src="questionnaire.js"></script>
</body>
</html>
