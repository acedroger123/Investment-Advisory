<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <form id="loginForm" class="card login-card">

    <h3 class="signinh2">Sign In</h3>

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
    <small class="error" id="emailError"></small>

    <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter password">
        <span class="toggle-password" onclick="toggle()">Show</span>
      </div>
      <small class="error" id="passwordError"></small>
      
      <p class="changepassword">
      <a href="password-otp.html">Forgot Password</a>
      </p>


    <button type="submit">Login</button>
    


    <p class="link">
      Don’t have an account?
      <a href="index.html">Register here.</a>
    </p>

  </form>

  <div id="privacyModal" class="modal">
    <div class="modal-content">
      <h3>Data Usage & Privacy Disclaimer</h3>
      <p>
        By continuing, you consent to the use of your data for financial analysis.
      </p>
      <div class="modal-actions">
        <button id="acceptBtn">I Accept</button>
      </div>
    </div>
  </div>

  <script src="SignIn.js"></script>
</body>
</html>
