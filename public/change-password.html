<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
  <div class="card login-card">
    <h2 style="text-align:center;">Set New Password</h2>

    <label>New Password</label>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Enter New password">
    <span class="toggle-password" onclick="toggle('password')">Show</span>
    </div>

    <label>Confirm Password</label>
    <div class="password-wrapper">
    <input type="password" id="confirmPassword" placeholder="Confirm password">
    <span class="toggle-password" onclick="toggle('confirmPassword')">Show</span>
    </div>

    <button id="changeBtn">Change Password</button>

    <div class="link">
      <a href="SignIn.html">Back to Sign In</a>
    </div>
  </div>

<script src="change-password.js">

</script>
</body>
</html>
