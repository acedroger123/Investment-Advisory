<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Tracker</title>
  <link rel="stylesheet" href="goaltracker.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-item">Dashboard</a>
    <a href="portfolio.html" class="nav-item">Portfolio</a>
    <a href="goaltracker.html" class="nav-item active">Goal Tracker</a>
    <a href="dashboard.html" class="nav-item">User Profile</a>
  </nav>


  <div class="container">
  <div class="header">
    <div class="title">
      <div>
        <h1>Gola Based Tracker</h1>
        <p>Traxk your financial goals and plan your future</p>
      </div>
    </div>
    <div class="addagoalbutton">
    <button class="addgoal" id="addgoalbutton">
      + Add a Goal
    </button>
  </div>
  </div>

  <div class="summarize">
    <div class="card">
      <span class="label">Total Goals</span>
      <span class="value" id="totalgoals">0</span>
    </div>
    <div class="card">
      <span class="label">Total Target Amount</span>
      <span class="value" id="totaltarget">0</span>
    </div>
    <div class="card">
      <span class="label">overall Progression</span>
      <span class="value" id="overallprogression">0</span>
    </div>
  </div>
</div>

<div class="container_two">
  <div class="goalheader">
    <div class="goaltitle">
      <div>
        <h2 id="goalname">-</h2>
        <div class ="meta">
          <span class="priority" id ="priority">-</span>
          <span id ="timeleft">-</span>
        </div>
      </div>
    </div>

  </div>
  <div class="">
    
  </div>

  <div class="amt">
  <div><label>Targer Amount</label><strong id="ta">-</strong></div>
  <div><label>current Amount</label><strong id="ca">-</strong></div>
  <div><label>Intial Investment</label><strong id="ii">-</strong></div>
  <div><label>Short Fall</label><strong class="danger" id="sf">-</strong></div>
  </div>
  <div class ="Progress">
    <div class="Progressheader">
      <span>Progress towards your goal</span>
      <span id="progresspercentage">0%</span>
    </div>
    <div class="Progressbar">
      <div id="progressfillup"></div>
    </div>
    <div class="timings">
      <span id="timeelapsed">-</span>
      <span id="timeremaining">-</span>
    </div>
  </div>

  <div class="sip">
    <h3>Required monthly SIP</h3>
    <div class="sipamt" id="totalsipamount">-</div>
    <p id="sipmeta">-</p>
  </div>

  <div class="projectionchart">
    <div class="projectionheader">
      <h3>Growth Projection</h3>
    </div>
  <canvas id="displaychart"></canvas>
  </div>
</div>
  
  <script src="goaltracker.js"></script>
</body>
</html>
