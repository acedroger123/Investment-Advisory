<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Wealth Dashboard</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-item active">Dashboard</a>
    <a href="dashboard.html" class="nav-item">Optimizer</a>
    <a href="dashboard.html" class="nav-item">Sentiment</a>
    <a href="dashboard.html" class="nav-item">Forecasting</a>
    <a href="dashboard.html" class="nav-item">Rebalancing</a>
    <a href="dashboard.html" class="nav-item">Profile</a>
  </nav>

  <main class = "container">
    <section class="cards">
      <div class="card">
      <h4>Total Value</h4>
      <h2 id="totalValue">--</h2>
      <p class = "positive" id="totalreturn">--</p>
      </div>
      

      <div class="card">
        <h4>YTD Return</h4>
        <h2 id="ytdReturn">--</h2>
        <p class="positive" id="benchmarkCompare">--</p>
      </div>

      <div class="card">
        <h4>Risk Score</h4>
        <h2 id="riskProfile">--</h2>
        <p id="sharpeRatio">--</p>
      </div>

      <div class="card">
        <h4>Portfolio Health</h4>
        <h2 id="portfolioHealth">--</h2>
        <p class="positive" id="healthScore">--</p>
      </div>

    </section>

    <section class="chart">
      <h3>Portfolio Performance</h3>
      <p class="subtitle">
        Year-to-date performance vs. benchmark (S&P 500)
      </p>
      <canvas id = "performanceChart"></canvas>
    </section>

    <section class = "holdings">
      <h3>Your top holdings</h3>
      <p class="subtitle">Your largest portfolio postrions</p>
      <div id = "holdingsList">


      </div>
    </section>

  </main>
  <script src="script.js"></script>
</body>
</html>
